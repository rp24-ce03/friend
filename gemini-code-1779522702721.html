<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, Bestie! 🎈</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-teal: #e0f7fa;
            --main-teal: #00897b;
            --light-teal: #b2dfdb;
            --accent-gold: #ffb300;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background-color: #80cbc4; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }

        .phone-wrapper { width: 100%; max-width: 410px; background: #ffffff; border-radius: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); overflow: hidden; min-height: 680px; display: flex; flex-direction: column; border: 4px solid #fff; }

        .screen { display: none; width: 100%; flex: 1; flex-direction: column; align-items: center; justify-content: center; padding: 25px; text-align: center; }
        .screen.active { display: flex; }

        h2 { font-family: 'Fredoka One', cursive; color: var(--main-teal); margin-bottom: 12px; font-size: 1.6rem; }
        .btn-action { background: var(--main-teal); color: white; border: none; padding: 14px 35px; font-size: 1.1rem; font-weight: 700; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,137,123,0.3); transition: transform 0.2s; width: 85%; }
        .btn-action:active { transform: scale(0.95); }

        /* Shared Styles for existing logic (Keypad, Balloons, etc) */
        .key-circle { width: 60px; height: 60px; background: var(--light-teal); color: var(--main-teal); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .key-circle:active { background: var(--main-teal); color: white; }
        .balloon { width: 55px; height: 70px; background: #ff7043; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; }
    </style>
</head>
<body>

<div class="phone-wrapper">
    <div id="screen-chat" class="screen active">
        <div class="chat-container" style="background:#f9f9f9; width:100%; flex:1; display:flex; flex-direction:column; justify-content:flex-end; padding:20px;">
            <div style="background:#e0e0e0; padding:12px; border-radius:15px; margin-bottom:10px; align-self:flex-start;">Happy Birthday, you legend! 🎂</div>
            <div style="background:var(--main-teal); color:white; padding:12px; border-radius:15px; align-self:flex-end;">I've got a surprise mission for you... 🎈</div>
            <button class="btn-action" style="margin-top:20px;" onclick="nextScreen('screen-lock')">Open Mission ➔</button>
        </div>
    </div>

    <div id="screen-lock" class="screen">
        <h2>Secret Mission Code</h2>
        <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:15px;">
            <div class="key-circle" onclick="checkCode('1')">1</div>
            <div class="key-circle" onclick="checkCode('2')">2</div>
            <div class="key-circle" onclick="checkCode('3')">3</div>
        </div>
        <p style="margin-top:20px;">Enter the code to unlock the fun!</p>
    </div>

    <div id="screen-dashboard" class="screen">
        <h2>Birthday Hub</h2>
        <button class="btn-action" onclick="alert('You are the best friend a person could ask for!')">Friendship Note ✉️</button>
        <button class="btn-action" style="background:var(--accent-gold); margin-top:15px;" onclick="alert('Time for cake and chaos!')">Party Mode 🍕</button>
    </div>
</div>

<script>
    function nextScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function checkCode(val) {
        if(val === '1') nextScreen('screen-dashboard');
        else alert("Wrong code, bestie! Try again!");
    }
</script>
</body>
</html>
